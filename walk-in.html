<body class="bg-surface text-on-surface font-body antialiased">
<!-- Top Navigation Anchor (Per JSON) -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-6 h-16 bg-[#010f21] shadow-lg">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-[#00929C] transition-all duration-200 active:scale-95 cursor-pointer">sync</span>
<h1 class="font-['Frank_Ruhl_Libre'] font-bold tracking-tight text-xl text-white">Atlas Spas</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-white/70 text-xs font-label uppercase tracking-widest">Showroom</span>
</div>
</header>
<main class="pt-24 pb-32 px-6 max-w-lg mx-auto min-h-screen bg-white">
<!-- Header Section -->
<section class="mb-10">
<h2 class="font-headline text-3xl text-on-surface leading-tight mb-2">Capture Walk-In Lead</h2>
<p class="text-on-surface-variant font-body">Quick entry for customers currently in the showroom.</p>
</section>
<!-- Lead Form -->
<form class="space-y-8">
<!-- Source Display (Read Only Style) -->
<div class="flex items-center justify-between p-4 bg-surface-container-low rounded">
<span class="text-on-surface-variant font-label text-sm">Source</span>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-sm text-primary">location_on</span>
<span class="font-semibold text-primary">Walk-In</span>
</div>
</div>
<!-- Input Fields Group -->
<div class="space-y-6">
<div class="relative">
<label class="block font-label text-sm text-[#5C5C5C] mb-1">Full Name</label>
<input id="fullName" class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 font-data text-lg text-on-surface focus:ring-0 transition-colors" placeholder="John Doe" type="text"/>
</div>
<div class="relative">
<label class="block font-label text-sm text-[#5C5C5C] mb-1">Phone Number</label>
<input id="phone" class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 font-data text-lg text-on-surface focus:ring-0 transition-colors" placeholder="(555) 000-0000" type="tel"/>
</div>
<div class="relative">
<label class="block font-label text-sm text-[#5C5C5C] mb-1">Email Address</label>
<input id="email" class="w-full bg-transparent border-t-0 border-x-0 border-b-2 border-outline-variant py-3 font-data text-lg text-on-surface focus:ring-0 transition-colors" placeholder="john@example.com" type="email"/>
</div>
</div>
<!-- Product Interest Chips -->
<div class="space-y-4">
<label class="block font-label text-sm font-semibold uppercase tracking-wider text-on-surface-variant">Product Interest</label>
<div id="interestChips" class="flex flex-wrap gap-3">
<button class="interest-chip px-5 py-2.5 rounded-full border border-primary text-primary font-body text-sm font-medium hover:bg-primary/5 transition-colors" type="button" data-interest="Hot Tub" onclick="selectInterest(this)">Hot Tub</button>
<button class="interest-chip px-5 py-2.5 rounded-full bg-primary-container text-on-primary font-body text-sm font-medium shadow-md" type="button" data-interest="Swim Spa" onclick="selectInterest(this)">Swim Spa</button>
<button class="interest-chip px-5 py-2.5 rounded-full border border-outline text-on-surface-variant font-body text-sm font-medium hover:border-primary transition-colors" type="button" data-interest="Cold Plunge" onclick="selectInterest(this)">Cold Plunge</button>
<button class="interest-chip px-5 py-2.5 rounded-full border border-outline text-on-surface-variant font-body text-sm font-medium hover:border-primary transition-colors" type="button" data-interest="Sauna" onclick="selectInterest(this)">Sauna</button>
</div>
</div>
<!-- Image/Mood Context - Asymmetric layout element -->
<div class="relative pt-6">
<div class="w-full h-40 bg-surface-container-high rounded overflow-hidden">
<img alt="Premium showroom interior" class="w-full h-full object-cover grayscale opacity-40 mix-blend-multiply" data-alt="Modern high-end luxury spa showroom with soft architectural lighting and clean minimalist design elements" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCHkO28ijieTqzr5jZyc_Tgbejfk-vSeRem7WBxGhAmc0LAwsyMSm2NpMbIHzZIUEt196FVmad3yYORt1WppKsvESrp8kYgV2TuZ5Ssi08RWm_8bUEuIXpXBEPC83XswP-VSX7X1puZwNiBzgtYi2XX_TpE-kropbAoEAuWhLBAbQpcTC--m845-T7Xwf7SRqpngyYXNVJxWZzkaT6a5xIyBYqAvy5Ha0GNREO3GLR5-tmHY_Swa6s7V1AI3OPzZtdPRpqtUsDrMOfK"/>
</div>
<div class="absolute top-10 -right-2 p-6 bg-surface-container-lowest/90 backdrop-blur-md shadow-xl max-w-[200px] rounded">
<p class="text-xs font-label text-on-surface-variant leading-relaxed">
                        Capture details accurately to generate a precision quote instantly.
                    </p>
</div>
</div>
</form>
</main>
<!-- Fixed Action Buttons Container -->
<footer class="fixed bottom-0 left-0 w-full bg-white/95 backdrop-blur-md p-6 flex flex-col gap-3 shadow-[0_-10px_30px_rgba(0,0,0,0.05)] border-t border-surface-container-high">
<button id="saveAndQuoteBtn" class="block w-full bg-[#00939B] text-white font-body font-bold text-lg py-4 rounded shadow-lg active:scale-95 transition-all duration-150 text-center" type="button" onclick="saveAndStartQuote()">
            Save &amp; Start Quote
        </button>
<button id="saveOnlyBtn" class="w-full bg-transparent border-2 border-outline-variant text-on-surface-variant font-body font-semibold text-base py-3 rounded active:bg-surface-container-low transition-colors" type="button" onclick="saveOnly()">
            Save Only
        </button>
</footer>
<!-- Bottom Nav Suppression Logic: User is in a focused Task Flow (Lead Capture),
         however the JSON specifies the Nav must exist for primary ecosystem destinations.
         Following the Shell Visibility Filter: suppression occurs if it's transactional.
         This is a data-entry form (Focused Journey). Nav suppressed for focus. -->

<!-- Toast container -->
<div id="toast-container" class="fixed top-20 left-0 w-full z-[60] flex justify-center px-6 pointer-events-none"></div>

<script>
const API_BASE = '';

function selectInterest(el) {
    document.querySelectorAll('.interest-chip').forEach(chip => {
        chip.classList.remove('bg-primary-container', 'text-on-primary', 'shadow-md');
        chip.classList.add('border', 'border-outline', 'text-on-surface-variant');
    });
    el.classList.remove('border', 'border-outline', 'text-on-surface-variant');
    el.classList.add('bg-primary-container', 'text-on-primary', 'shadow-md');
}

function getSelectedInterest() {
    const selected = document.querySelector('.interest-chip.bg-primary-container');
    return selected ? selected.dataset.interest : '';
}

function getFormData() {
    const fullName = document.getElementById('fullName').value.trim();
    const spaceIdx = fullName.indexOf(' ');
    const firstName = spaceIdx > -1 ? fullName.substring(0, spaceIdx) : fullName;
    const lastName = spaceIdx > -1 ? fullName.substring(spaceIdx + 1) : '';
    const phone = document.getElementById('phone').value.trim();
    const email = document.getElementById('email').value.trim();
    const interest = getSelectedInterest();
    return { firstName, lastName, fullName, phone, email, interest };
}

async function createCustomerAndLead(formData) {
    // POST customer
    const custRes = await fetch(API_BASE + '/api/customers', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            first_name: formData.firstName,
            last_name: formData.lastName,
            phone: formData.phone,
            email: formData.email,
            source: 'walk-in'
        })
    });

    if (!custRes.ok) throw new Error('Failed to create customer');
    const customer = await custRes.json();

    // POST lead
    const leadRes = await fetch(API_BASE + '/api/leads', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            customer_id: customer.id,
            event_id: 1,
            source: 'walk-in',
            product_interest: formData.interest,
            status: 'new',
            assigned_rep: 'Brock'
        })
    });

    if (!leadRes.ok) throw new Error('Failed to create lead');
    const lead = await leadRes.json();

    return { customer, lead };
}

async function saveAndStartQuote() {
    const formData = getFormData();
    if (!formData.firstName) {
        showToast('Please enter a name');
        return;
    }

    const btn = document.getElementById('saveAndQuoteBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Saving...';
    btn.disabled = true;

    try {
        const { customer } = await createCustomerAndLead(formData);
        const params = new URLSearchParams({
            customer_id: customer.id,
            customer_name: formData.firstName + ' ' + formData.lastName,
            product_interest: formData.interest
        });
        window.location.href = 'quote-builder.html?' + params.toString();
    } catch(e) {
        console.error('Save and start quote failed:', e);
        btn.innerHTML = originalText;
        btn.disabled = false;
        showToast('Error saving lead. Please try again.');
    }
}

async function saveOnly() {
    const formData = getFormData();
    if (!formData.firstName) {
        showToast('Please enter a name');
        return;
    }

    const btn = document.getElementById('saveOnlyBtn');
    const originalText = btn.innerHTML;
    btn.innerHTML = 'Saving...';
    btn.disabled = true;

    try {
        await createCustomerAndLead(formData);
        btn.innerHTML = '<span style="color: #059669;">Saved!</span>';
        showToast('Lead saved successfully');
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.disabled = false;
        }, 2000);
    } catch(e) {
        console.error('Save only failed:', e);
        btn.innerHTML = originalText;
        btn.disabled = false;
        showToast('Error saving lead. Please try again.');
    }
}

function showToast(message) {
    const container = document.getElementById('toast-container');
    const toast = document.createElement('div');
    toast.style.cssText = 'background:#010f21;color:#fff;padding:12px 20px;border-radius:12px;font-size:14px;font-weight:500;text-align:center;max-width:320px;opacity:0;transform:translateY(20px);transition:all 0.3s ease;';
    toast.textContent = message;
    container.appendChild(toast);
    requestAnimationFrame(() => {
        toast.style.opacity = '1';
        toast.style.transform = 'translateY(0)';
    });
    setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateY(-10px)';
        setTimeout(() => toast.remove(), 300);
    }, 3000);
}
</script>
</body></html>
