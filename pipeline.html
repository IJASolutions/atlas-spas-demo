<!-- Pipeline Stats -->

<!-- Stage Filter Chips -->
<section class="mb-6">
<div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2" id="stage-chips">
<button class="whitespace-nowrap px-4 py-2 bg-primary-container text-white rounded-full font-medium text-xs transition-all active:scale-95" data-stage="all" onclick="filterStage('all', this)">All</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="new" onclick="filterStage('new', this)">New</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="showed" onclick="filterStage('showed', this)">Showed</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="quoted" onclick="filterStage('quoted', this)">Quoted</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="negotiating" onclick="filterStage('negotiating', this)">Negotiating</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="closed_won" onclick="filterStage('closed_won', this)">Won</button>
<button class="whitespace-nowrap px-4 py-2 bg-surface-container-highest text-on-surface-variant rounded-full font-medium text-xs transition-all active:scale-95" data-stage="closed_lost" onclick="filterStage('closed_lost', this)">Lost</button>

<!-- BottomNavBar -->

<a class="flex flex-col items-center justify-center text-slate-400 hover:text-white transition-colors active:scale-90 transition-transform duration-150" href="dashboard.html">

</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-white transition-colors active:scale-90 transition-transform duration-150" href="walk-in.html">
<span class="material-symbols-outlined" data-icon="person_add">person_add</span>
<span class="font-['Figtree'] text-[11px] font-medium uppercase tracking-wider">Leads</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 hover:text-white transition-colors active:scale-90 transition-transform duration-150" href="catalog.html">
<span class="material-symbols-outlined" data-icon="pool">pool</span>
<span class="font-['Figtree'] text-[11px] font-medium uppercase tracking-wider">Catalog</span>
</a>

</a>

<span class="font-['Figtree'] text-[11px] font-medium uppercase tracking-wider">More</span>
</a>

<script>
let allLeads = [];
let currentFilter = 'all';

const STATUS_CONFIG = {
  'new':            { label: 'New',         color: 'bg-blue-100 text-blue-700',    icon: 'fiber_new' },
  'appointment_set':{ label: 'Appt Set',    color: 'bg-purple-100 text-purple-700',icon: 'calendar_today' },
  'showed':         { label: 'Showed',      color: 'bg-cyan-100 text-cyan-700',    icon: 'how_to_reg' },
  'quoted':         { label: 'Quoted',      color: 'bg-amber-100 text-amber-700',  icon: 'description' },
  'negotiating':    { label: 'Negotiating', color: 'bg-orange-100 text-orange-700',icon: 'handshake' },
  'closed_won':     { label: 'Won',         color: 'bg-emerald-100 text-emerald-700', icon: 'check_circle' },
  'closed_lost':    { label: 'Lost',        color: 'bg-red-100 text-red-700',      icon: 'cancel' },
  'follow_up':      { label: 'Follow Up',   color: 'bg-yellow-100 text-yellow-700',icon: 'phone_callback' },
};

function fmt(n) {
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
}

async function loadPipeline() {
  try {
    const res = await fetch('/api/leads');
    allLeads = await res.json();
    renderStats();
    renderLeads();
  } catch(e) {
    document.getElementById('leads-list').innerHTML = '<div class="text-center py-12 text-error">Failed to load pipeline</div>';
  }
}

function renderStats() {
  const counts = {};
  allLeads.forEach(l => { counts[l.status] = (counts[l.status] || 0) + 1; });
  const statsEl = document.getElementById('pipeline-stats');
  const stages = ['new', 'showed', 'quoted', 'negotiating', 'closed_won'];
  statsEl.innerHTML = stages.map(s => {
    const cfg = STATUS_CONFIG[s] || { label: s, color: 'bg-gray-100 text-gray-700' };
    return `<div class="flex-shrink-0 w-28 p-3 bg-surface-container-lowest rounded-xl shadow-[0_4px_12px_rgba(1,15,33,0.04)]">
      <p class="text-outline text-[9px] font-bold uppercase tracking-tighter mb-1">${cfg.label}</p>
      <p class="serif-display text-xl text-on-surface">${counts[s] || 0}</p>
    </div>`;
  }).join('');
}

function renderLeads() {
  const container = document.getElementById('leads-list');
  const filtered = currentFilter === 'all' ? allLeads : allLeads.filter(l => l.status === currentFilter);

  if (filtered.length === 0) {
    container.innerHTML = '<div class="text-center py-12 text-outline">No leads in this stage</div>';
    return;
  }

  container.innerHTML = filtered.map(lead => {
    const cfg = STATUS_CONFIG[lead.status] || { label: lead.status, color: 'bg-gray-100 text-gray-700', icon: 'person' };
    const timeAgo = getTimeAgo(lead.updated_at);
    return `<div class="bg-surface-container-lowest p-4 rounded-xl shadow-[0_4px_12px_rgba(1,15,33,0.04)] flex items-center gap-4">
      <div class="w-10 h-10 rounded-full bg-primary/10 flex items-center justify-center flex-shrink-0">
        <span class="material-symbols-outlined text-primary text-lg">${cfg.icon}</span>
      </div>
      <div class="flex-1 min-w-0">
        <div class="flex items-center justify-between mb-1">
          <h4 class="font-bold text-[#010f21] text-sm truncate">${lead.first_name} ${lead.last_name}</h4>
          <span class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${cfg.color}">${cfg.label}</span>
        </div>
        <p class="text-on-surface-variant text-xs truncate">${lead.product_interest || 'No product specified'}</p>
        <div class="flex items-center gap-3 mt-1">
          <span class="text-outline text-[10px]">${lead.source}</span>
          <span class="text-outline text-[10px]">Rep: ${lead.assigned_rep || 'Unassigned'}</span>
          <span class="text-outline text-[10px]">${timeAgo}</span>
        </div>
        ${lead.notes ? `<p class="text-on-surface-variant text-[11px] mt-2 italic truncate">"${lead.notes}"</p>` : ''}
      </div>
      <button class="self-center flex-shrink-0" onclick="showLeadActions(${lead.id})">
        <span class="material-symbols-outlined text-outline">more_vert</span>
      </button>
    </div>`;
  }).join('');
}

function filterStage(stage, btn) {
  currentFilter = stage;
  document.querySelectorAll('#stage-chips button').forEach(b => {
    b.className = b.className.replace('bg-primary-container text-white', 'bg-surface-container-highest text-on-surface-variant');
  });
  btn.className = btn.className.replace('bg-surface-container-highest text-on-surface-variant', 'bg-primary-container text-white');
  renderLeads();
}

function getTimeAgo(dateStr) {
  if (!dateStr) return '';
  const now = new Date();
  const then = new Date(dateStr);
  const mins = Math.floor((now - then) / 60000);
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}

function showLeadActions(leadId) {
  const lead = allLeads.find(l => l.id === leadId);
  if (!lead) return;
  const action = prompt(`Update "${lead.first_name} ${lead.last_name}" status to:\nnew, showed, quoted, negotiating, closed_won, closed_lost, follow_up`);
  if (action && STATUS_CONFIG[action]) {
    fetch(`/api/leads/${leadId}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: action })
    }).then(() => loadPipeline());
  }
}

document.addEventListener('DOMContentLoaded', loadPipeline);
// Auto-refresh every 10 seconds
setInterval(loadPipeline, 10000);
</script>
