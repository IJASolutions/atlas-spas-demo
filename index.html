</div>
<div class="group relative">
<label class="block text-secondary-fixed-dim font-label text-xs font-medium mb-1 ml-1 transition-colors group-focus-within:text-primary-fixed" for="password">Password</label>
<input class="w-full bg-white/5 border-b-2 border-outline-variant/30 text-white px-4 py-3 rounded-t-lg focus:outline-none focus:ring-0 focus:border-primary-container transition-all duration-300 placeholder:text-white/20" id="password" name="password" placeholder="••••••••" type="password"/>
</div>
</div>
<div class="flex items-center justify-between">
<label class="flex items-center space-x-2 cursor-pointer">
<input class="w-4 h-4 rounded-sm bg-white/10 border-outline-variant/30 text-primary focus:ring-primary focus:ring-offset-[#010f21]" type="checkbox"/>
<span class="text-white/60 text-sm">Remember me</span>

</div>
